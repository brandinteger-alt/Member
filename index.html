<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Integer — Member Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F1720; --surface: #171F2A; --surface-2: #1E2733; --border: #2A3542;
    --text: #EDEAE3; --text-dim: #93A0AD; --gold: #C9A227; --green: #4C9A6A; --red: #C6543D;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; padding-bottom: 76px; }
  h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
  .app { max-width: 480px; margin: 0 auto; min-height: 100vh; }
  header { padding: 20px 20px 14px; display: flex; align-items: center; justify-content: space-between; }
  header .brand { font-family: 'Space Grotesk'; font-weight: 700; font-size: 17px; letter-spacing: -0.02em; }
  header .brand span { color: var(--gold); }
  .pill { font-size: 12px; color: var(--text-dim); background: var(--surface); border: 1px solid var(--border); padding: 5px 10px; border-radius: 100px; }
  .screen { display: none; padding: 0 20px 20px; animation: fadeIn .25s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: none; } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 14px; }
  label { display: block; font-size: 13px; color: var(--text-dim); margin: 14px 0 6px; }
  input { width: 100%; padding: 13px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 15px; font-family: inherit; }
  input:focus { outline: none; border-color: var(--gold); }
  .btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; margin-top: 18px; }
  .btn-primary { background: var(--gold); color: #1A1509; }
  .link-btn { background: none; border: none; color: var(--gold); font-size: 13px; text-decoration: underline; cursor: pointer; padding: 0; margin-top: 14px; display: block; width: 100%; text-align: center; }
  .msg { font-size: 13px; padding: 10px 12px; border-radius: 8px; margin-top: 12px; display: none; }
  .msg.show { display: block; }
  .msg.err { background: rgba(198,84,61,0.15); color: #E39485; }
  .msg.ok { background: rgba(76,154,106,0.15); color: #8FCBA5; }
  .hidden { display: none !important; }

  /* Slots */
  .slot-item { padding: 14px; border-radius: 10px; background: var(--surface-2); margin-bottom: 10px; border: 1px solid var(--border); display: flex; gap: 12px; }
  .slot-item .thumb { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; background: var(--surface); flex-shrink: 0; }
  .slot-item .info { flex: 1; min-width: 0; }
  .slot-item .p { font-weight: 600; font-size: 14px; }
  .slot-item .d { font-size: 12px; color: var(--text-dim); margin-top: 3px; }
  .slot-item .less-row { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
  .less-tag { font-size: 11px; background: rgba(201,162,39,0.12); color: var(--gold); padding: 3px 8px; border-radius: 100px; }
  .form-link-btn { display: block; text-align: center; background: var(--gold); color: #1A1509; text-decoration: none; padding: 12px; border-radius: 10px; font-weight: 700; font-size: 14px; margin: 16px 0 4px; }

  /* Order/Refund cards */
  .order-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px; }
  .order-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .order-top .oid { font-weight: 700; font-size: 14px; }
  .order-top .brand { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .status-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 100px; white-space: nowrap; }
  .status-badge.not_filed { background: rgba(147,160,173,0.18); color: var(--text-dim); }
  .status-badge.pending_payment { background: rgba(201,162,39,0.18); color: var(--gold); }
  .status-badge.paid { background: rgba(76,154,106,0.18); color: #8FCBA5; }
  .overdue-tag { font-size: 10px; color: var(--red); font-weight: 700; background: rgba(198,84,61,0.15); padding: 2px 8px; border-radius: 100px; margin-left: 6px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; margin-top: 10px; }
  .detail-grid .item .k { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .03em; }
  .detail-grid .item .v { font-size: 13px; margin-top: 2px; word-break: break-word; }
  .empty { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 14px; }

  nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); display: flex; max-width: 480px; margin: 0 auto; }
  nav button { flex: 1; background: none; border: none; color: var(--text-dim); font-family: inherit; font-size: 11px; padding: 12px 4px 10px; cursor: pointer; }
  nav button .icon { font-size: 19px; display: block; margin-bottom: 3px; }
  nav button.active { color: var(--gold); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">Brand<span>Integer</span> <small id="versionTag" style="color:var(--text-dim); font-weight:400; font-size:10px;"></small></div>
    <div class="pill" id="headerStatus">Not logged in</div>
  </header>

  <!-- AUTH -->
  <div class="screen active" id="screen-auth">
    <div class="card">
      <h2 style="margin-top:0;">Member Login</h2>
      <div id="loginForm">
        <label>Phone or Email</label>
        <input type="text" id="loginId" placeholder="9876543210">
        <label>Password</label>
        <input type="password" id="loginPass" placeholder="••••••••">
        <button class="btn btn-primary" onclick="doLogin()">Log In</button>
        <button class="link-btn" onclick="showForgot()">Forgot password?</button>
        <button class="link-btn" onclick="showSignup()">New here? Create an account</button>
        <div class="msg" id="loginMsg"></div>
      </div>
      <div id="signupForm" class="hidden">
        <label>Full Name</label>
        <input type="text" id="suName" placeholder="Your name">
        <label>Phone</label>
        <input type="text" id="suPhone" placeholder="9876543210">
        <label>Email (optional, for password reset)</label>
        <input type="text" id="suEmail" placeholder="you@email.com">
        <label>WhatsApp Number (if different from phone)</label>
        <input type="text" id="suWhatsapp" placeholder="Leave blank if same as phone">
        <label>Create Password</label>
        <input type="password" id="suPass" placeholder="At least 6 characters">
        <button class="btn btn-primary" onclick="doSignup()">Create Account</button>
        <button class="link-btn" onclick="showLogin()">Already have an account? Log in</button>
        <div class="msg" id="signupMsg"></div>
      </div>
      <div id="forgotForm" class="hidden">
        <label>Phone or Email</label>
        <input type="text" id="fgId" placeholder="9876543210">
        <button class="btn btn-primary" onclick="doForgot()">Send Reset Code</button>
        <div id="fgResetBlock" class="hidden">
          <label>Reset Code (from email)</label>
          <input type="text" id="fgToken" placeholder="Paste the code">
          <label>New Password</label>
          <input type="password" id="fgNewPass" placeholder="At least 6 characters">
          <button class="btn btn-primary" onclick="doReset()">Set New Password</button>
        </div>
        <button class="link-btn" onclick="showLogin()">Back to login</button>
        <div class="msg" id="forgotMsg"></div>
      </div>
    </div>
  </div>

  <!-- SLOTS (read-only) -->
  <div class="screen" id="screen-slots">
    <h2>Available Slots</h2>
    <p style="color:var(--text-dim); font-size:13px; margin-top:-8px;">To order, fill the Google Form — this list is just to see what's live.</p>
    <div id="slotsList"><div class="empty">Loading slots…</div></div>
  </div>

  <!-- DASHBOARD -->
  <div class="screen" id="screen-dashboard">
    <h2>My Orders &amp; Refunds</h2>
    <div id="dashboardList"><div class="empty">Loading…</div></div>
  </div>

  <nav id="mainNav" class="hidden">
    <button onclick="switchTab('slots')" id="navSlots"><span class="icon">🗓️</span>Slots</button>
    <button onclick="switchTab('dashboard')" id="navDashboard"><span class="icon">💸</span>My Orders</button>
    <button onclick="logout()" id="navLogout"><span class="icon">🚪</span>Logout</button>
  </nav>
</div>

<script>
// ============ CONFIG ============
const API_URL = 'https://script.google.com/macros/s/AKfycbyaglV46QYC2dGDF5Jt9hCYR29qj_aYbyCAeV90jb2r2kIwlXBwbCzzx2r7vNGUjSha/exec';
const PORTAL_VERSION = 'v2.3';
// If you use one Google Form link for ordering, paste it here so the Slots tab can link out to it:
const ORDER_FORM_URL = ''; // e.g. 'https://forms.gle/xxxxxxx'

// ============ SESSION ============
let session = JSON.parse(localStorage.getItem('bi_session') || 'null');
function saveSession(s) { session = s; localStorage.setItem('bi_session', JSON.stringify(s)); }
function clearSession() { session = null; localStorage.removeItem('bi_session'); }

// ============ API HELPERS ============
async function apiPost(action, body) {
  try {
    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, token: session ? session.token : undefined, ...body }) });
    return await res.json();
  } catch (err) {
    return { error: 'connection_failed', detail: String(err) };
  }
}
async function apiGet(action, extraParams) {
  try {
    const params = new URLSearchParams({ action, token: session ? session.token : '', ...extraParams });
    const res = await fetch(API_URL + '?' + params.toString());
    return await res.json();
  } catch (err) {
    return { error: 'connection_failed', detail: String(err) };
  }
}

// ============ AUTH SCREENS ============
function showLogin() { toggleAuth('loginForm'); }
function showSignup() { toggleAuth('signupForm'); }
function showForgot() { toggleAuth('forgotForm'); }
function toggleAuth(showId) {
  ['loginForm','signupForm','forgotForm'].forEach(id => document.getElementById(id).classList.toggle('hidden', id !== showId));
}
function flash(id, text, ok) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg show ' + (ok ? 'ok' : 'err');
}

async function doLogin() {
  const identifier = document.getElementById('loginId').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!identifier || !password) return flash('loginMsg', 'Enter your phone/email and password.', false);
  const r = await apiPost('login', { identifier, password });
  if (r.error === 'connection_failed') return flash('loginMsg', 'Could not reach the server: ' + r.detail, false);
  if (r.error) return flash('loginMsg', r.error === 'wrong_password' ? 'Wrong password.' : 'Account not found.', false);
  saveSession({ token: r.token, member_id: r.member_id, name: r.name });
  enterApp();
}
async function doSignup() {
  const name = document.getElementById('suName').value.trim();
  const phone = document.getElementById('suPhone').value.trim();
  const email = document.getElementById('suEmail').value.trim();
  const whatsapp = document.getElementById('suWhatsapp').value.trim();
  const password = document.getElementById('suPass').value;
  if (!name || !phone || !password) return flash('signupMsg', 'Name, phone, and password are required.', false);
  if (password.length < 6) return flash('signupMsg', 'Password must be at least 6 characters.', false);
  const r = await apiPost('signup', { name, phone, email, whatsapp, password });
  if (r.error === 'connection_failed') return flash('signupMsg', 'Could not reach the server: ' + r.detail, false);
  if (r.error) return flash('signupMsg', r.error === 'already_exists' ? 'An account already exists with this phone/email.' : 'Something went wrong.', false);
  saveSession({ token: r.token, member_id: r.member_id, name });
  enterApp();
}
let forgotIdentifier = '';
async function doForgot() {
  forgotIdentifier = document.getElementById('fgId').value.trim();
  if (!forgotIdentifier) return flash('forgotMsg', 'Enter your phone or email.', false);
  const r = await apiPost('forgotPassword', { identifier: forgotIdentifier });
  if (r.error) return flash('forgotMsg', 'Account not found.', false);
  document.getElementById('fgResetBlock').classList.remove('hidden');
  flash('forgotMsg', r.sent_to === 'email' ? 'Reset code sent to your email.' : 'No email on file — ask admin for help resetting.', true);
}
async function doReset() {
  const token = document.getElementById('fgToken').value.trim();
  const newPassword = document.getElementById('fgNewPass').value;
  if (newPassword.length < 6) return flash('forgotMsg', 'Password must be at least 6 characters.', false);
  const r = await apiPost('resetPassword', { identifier: forgotIdentifier, token, newPassword });
  if (r.error) return flash('forgotMsg', 'Reset code invalid or expired. Request a new one.', false);
  flash('forgotMsg', 'Password updated! You can log in now.', true);
  setTimeout(showLogin, 1200);
}
function logout() {
  clearSession();
  document.getElementById('mainNav').classList.add('hidden');
  document.getElementById('headerStatus').textContent = 'Not logged in';
  showScreen('screen-auth');
  showLogin();
}

// ============ APP SHELL ============
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function switchTab(tab) {
  document.querySelectorAll('#mainNav button').forEach(b => b.classList.remove('active'));
  document.getElementById('nav' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  showScreen('screen-' + tab);
  if (tab === 'slots') loadSlots();
  if (tab === 'dashboard') loadDashboard();
}
function enterApp() {
  document.getElementById('mainNav').classList.remove('hidden');
  document.getElementById('headerStatus').textContent = session.name || 'Member';
  switchTab('slots');
  startPolling();
}

// ============ SLOTS (read-only) ============
async function loadSlots() {
  const r = await apiGet('publicSlots');
  const list = document.getElementById('slotsList');
  if (r.error) { list.innerHTML = '<div class="empty">Slots aren\'t set up yet — check back soon.</div>'; return; }
  if (!r.length) { list.innerHTML = '<div class="empty">No live slots right now. Check back soon.</div>'; return; }
  list.innerHTML = r.map(s => `
    <div class="slot-item">
      ${s.image_url ? `<img class="thumb" src="${escapeHtml(s.image_url)}" onerror="this.style.display='none'">` : ''}
      <div class="info">
        <div class="p">${escapeHtml(s.brand)} — ${escapeHtml(s.product)}</div>
        <div class="d">${escapeHtml(s.date)} · ${s.slots_left} slot${s.slots_left === 1 ? '' : 's'} left</div>
        <div class="less-row">
          ${s.normal_less ? `<span class="less-tag">Normal: ${escapeHtml(s.normal_less)}</span>` : ''}
          ${s.premium_less ? `<span class="less-tag">Premium: ${escapeHtml(s.premium_less)}</span>` : ''}
          ${s.mediator_less ? `<span class="less-tag">Mediator: ${escapeHtml(s.mediator_less)}</span>` : ''}
        </div>
      </div>
    </div>
  `).join('') + (ORDER_FORM_URL ? `<a class="form-link-btn" href="${ORDER_FORM_URL}" target="_blank">Fill Order Form →</a>` : '');
}

// ============ DASHBOARD ============
const STATUS_LABEL = { not_filed: 'Refund form not filed', pending_payment: 'Payment pending', paid: 'Paid' };
async function loadDashboard() {
  const r = await apiGet('memberDashboard');
  const list = document.getElementById('dashboardList');
  if (r.error || !r.orders || !r.orders.length) {
    list.innerHTML = '<div class="empty">No orders found linked to your account yet.</div>';
    return;
  }
  list.innerHTML = r.orders.map(o => `
    <div class="order-card">
      <div class="order-top">
        <div>
          <div class="oid">${escapeHtml(o.order_id)}</div>
          <div class="brand">${escapeHtml(o.brand || '')} ${o.product_ordered ? '· ' + escapeHtml(o.product_ordered) : ''}</div>
        </div>
        <div>
          <span class="status-badge ${o.status}">${STATUS_LABEL[o.status] || o.status}</span>
          ${o.overdue ? '<span class="overdue-tag">OVERDUE</span>' : ''}
        </div>
      </div>
      <div class="detail-grid">
        <div class="item"><div class="k">Order Date</div><div class="v">${escapeHtml(o.order_date)}</div></div>
        <div class="item"><div class="k">Reviewer</div><div class="v">${escapeHtml(o.reviewer_name || '—')}</div></div>
        <div class="item"><div class="k">Product Code</div><div class="v">${escapeHtml(o.product_code)}</div></div>
        <div class="item"><div class="k">Deliverable</div><div class="v">${escapeHtml(o.deliverable_type || '—')}</div></div>
        <div class="item"><div class="k">Order Amount</div><div class="v">₹${escapeHtml(o.total_order_amount || '—')}</div></div>
        <div class="item"><div class="k">Less</div><div class="v">${escapeHtml(o.less || '—')}</div></div>
        <div class="item"><div class="k">Mediator</div><div class="v">${escapeHtml(o.mediator_name || '—')}</div></div>
        <div class="item"><div class="k">Refund Amount</div><div class="v">${o.refund_amount ? '₹' + escapeHtml(o.refund_amount) : '—'}</div></div>
        <div class="item"><div class="k">RF Filed Date</div><div class="v">${o.refund_filed_date ? escapeHtml(formatDate(o.refund_filed_date)) : '—'}</div></div>
        <div class="item"><div class="k">Payment Date</div><div class="v">${o.refund_date ? escapeHtml(formatDate(o.refund_date)) : '—'}</div></div>
        <div class="item"><div class="k">Paid By</div><div class="v">${escapeHtml(o.paid_by || '—')}</div></div>
        <div class="item"><div class="k">Mode of Payment</div><div class="v">${escapeHtml(o.mode_of_payment || '—')}</div></div>
      </div>
    </div>
  `).join('');
}

// ============ REAL-TIME POLLING ============
let pollTimer = null;
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(() => {
    const active = document.querySelector('.screen.active').id;
    if (active === 'screen-slots') loadSlots();
    if (active === 'screen-dashboard') loadDashboard();
  }, 25000);
}

// ============ UTIL ============
function escapeHtml(str) {
  return String(str == null ? '' : str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function formatDate(v) {
  const d = new Date(v);
  return isNaN(d) ? String(v) : d.toLocaleDateString();
}

// ============ BOOT ============
document.getElementById('versionTag').textContent = PORTAL_VERSION;
if (session && session.token) { enterApp(); }
</script>
</body>
</html>
